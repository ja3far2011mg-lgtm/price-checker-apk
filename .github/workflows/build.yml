name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Get the project files
        uses: actions/checkout@v4

      - name: Set up Java (required for Android builds)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install project dependencies
        run: npm install

      - name: Install Capacitor Android platform
        run: npm install @capacitor/android

      - name: Add Android platform (first time only)
        run: |
          if [ ! -d "android" ] || [ ! -f "android/build.gradle" ]; then
            npx cap add android
          fi

      - name: Allow normal internet access (fixes "Failed to fetch")
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system"/>
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q 'networkSecurityConfig' "$MANIFEST"; then
            sed -i 's#<application#<application android:networkSecurityConfig="@xml/network_security_config"#' "$MANIFEST"
          fi
          if ! grep -q 'android.permission.INTERNET' "$MANIFEST"; then
            sed -i 's#<application#<uses-permission android:name="android.permission.INTERNET" />\n    <application#' "$MANIFEST"
          fi

      - name: Copy web files into the Android project
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build the debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload the finished APK
        uses: actions/upload-artifact@v4
        with:
          name: price-checker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
